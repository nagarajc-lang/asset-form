<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Declaration Form — IT Entry</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;padding:24px 16px}
  .page{max-width:860px;margin:0 auto;background:#fff;border-radius:10px;box-shadow:0 2px 16px rgba(0,0,0,.1);overflow:hidden}
  .header{background:linear-gradient(135deg,#1a237e 0%,#283593 100%);color:#fff;padding:28px 36px}
  .header .company{font-size:22px;font-weight:700;letter-spacing:.5px}
  .header .address{font-size:13px;opacity:.8;margin-top:4px}
  .header .form-title{font-size:16px;font-weight:600;margin-top:16px;text-transform:uppercase;letter-spacing:1px;opacity:.95}
  .form-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:20px 36px;background:#f8f9ff;border-bottom:1px solid #e0e4f0}
  .meta-field label{font-size:11px;font-weight:600;color:#5c6bc0;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
  .meta-field input,select{width:100%;border:1px solid #c5cae9;border-radius:6px;padding:8px 10px;font-size:13px;color:#1a1a2e;background:#fff;outline:none;transition:border .2s}
  .meta-field input:focus,select:focus{border-color:#3949ab}
  .section{padding:24px 36px;border-bottom:1px solid #eef0f8}
  .section-title{font-size:13px;font-weight:700;color:#3949ab;text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;padding-bottom:6px;border-bottom:2px solid #e8eaf6}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .field{margin-bottom:0}
  .field label{font-size:12px;font-weight:600;color:#546e7a;display:block;margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;border:1px solid #cfd8dc;border-radius:6px;padding:9px 11px;font-size:13px;color:#1a1a2e;background:#fff;outline:none;transition:border .2s;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:#3949ab;box-shadow:0 0 0 3px rgba(57,73,171,.08)}
  .table-section{padding:24px 36px;border-bottom:1px solid #eef0f8}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead tr{background:#e8eaf6}
  thead th{padding:10px 10px;text-align:left;font-size:11px;font-weight:700;color:#3949ab;text-transform:uppercase;letter-spacing:.4px;border:1px solid #c5cae9}
  tbody tr td{padding:4px 4px;border:1px solid #e0e4f0}
  tbody tr:nth-child(even){background:#fafbff}
  tbody td input{width:100%;border:none;padding:6px 6px;font-size:13px;background:transparent;outline:none;color:#1a1a2e}
  tbody td input:focus{background:#f0f4ff}
  .add-row-btn{margin-top:10px;padding:7px 16px;background:#e8eaf6;border:1px solid #c5cae9;border-radius:6px;font-size:12px;font-weight:600;color:#3949ab;cursor:pointer;transition:background .2s}
  .add-row-btn:hover{background:#c5cae9}
  .footer-section{padding:24px 36px}
  .submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:opacity .2s}
  .submit-btn:hover{opacity:.9}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:14px;padding:12px 16px;border-radius:6px;font-size:13px;display:none}
  .msg.success{background:#e8f5e9;color:#2e7d32;border-left:4px solid #43a047;display:block}
  .msg.error{background:#ffebee;color:#c62828;border-left:4px solid #e53935;display:block}
  @media(max-width:640px){
    .form-meta,.two-col,.three-col{grid-template-columns:1fr}
    .header,.section,.table-section,.footer-section{padding:16px 18px}
    table{font-size:11px}
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="company">PlaySimple Games Limited</div>
    <div class="address">123 Tech Park, Bengaluru, Karnataka — 560100 &nbsp;|&nbsp; it@playsimple.in</div>
    <div class="form-title">Asset Declaration Form — IT Entry</div>
  </div>

  <div class="form-meta">
    <div class="meta-field">
      <label>Date of Issue</label>
      <input type="date" id="issue_date" required>
    </div>
    <div class="meta-field">
      <label>Issue Form Number</label>
      <input type="text" id="form_number" placeholder="PSG-2024-001" required>
    </div>
    <div class="meta-field">
      <label>Asset Category</label>
      <select id="category" required>
        <option value="">— Select —</option>
        <option>Laptop</option>
        <option>Mobile</option>
        <option>Monitor</option>
        <option>Keyboard / Mouse</option>
        <option>Hard Drive / SSD</option>
        <option>Headset</option>
        <option>Other</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Employee Details</div>
    <div class="three-col">
      <div class="field"><label>Employee Name *</label><input type="text" id="emp_name" placeholder="Full name" required></div>
      <div class="field"><label>Designation *</label><input type="text" id="designation" placeholder="e.g. Software Engineer"></div>
      <div class="field"><label>Department *</label><input type="text" id="department" placeholder="e.g. Engineering"></div>
      <div class="field"><label>Employee ID</label><input type="text" id="emp_id" placeholder="PSG-0001"></div>
      <div class="field"><label>Employee Email *</label><input type="email" id="emp_email" placeholder="employee@playsimple.in" required></div>
      <div class="field"><label>Location / Office</label><input type="text" id="location" placeholder="Bengaluru HQ"></div>
    </div>
  </div>

  <div class="table-section">
    <div class="section-title">Asset Details</div>
    <table id="asset-table">
      <thead>
        <tr>
          <th>Asset Tag #</th>
          <th>Description</th>
          <th>Serial Number</th>
          <th>Model Number</th>
          <th>Make / Brand</th>
          <th>Invoice #</th>
          <th style="width:48px">Qty</th>
          <th>Remarks</th>
        </tr>
      </thead>
      <tbody id="asset-rows">
        <tr>
          <td><input type="text" placeholder="TAG-001"></td>
          <td><input type="text" placeholder="Dell Latitude 5420"></td>
          <td><input type="text" placeholder="SN-XXXX"></td>
          <td><input type="text" placeholder="Latitude 5420"></td>
          <td><input type="text" placeholder="Dell"></td>
          <td><input type="text" placeholder="INV-2024-001"></td>
          <td><input type="number" value="1" min="1" style="text-align:center"></td>
          <td><input type="text" placeholder="Good condition"></td>
        </tr>
      </tbody>
    </table>
    <button class="add-row-btn" onclick="addRow()">+ Add Row</button>
  </div>

  <div class="section">
    <div class="section-title">Additional Notes (IT)</div>
    <div class="field">
      <textarea id="it_notes" rows="3" placeholder="Any additional instructions, accessories included, known issues, etc."></textarea>
    </div>
  </div>

  <div class="footer-section">
    <button class="submit-btn" onclick="submitForm()">Submit & Send to Employee</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
function addRow(){
  const tbody=document.getElementById('asset-rows');
  const row=document.createElement('tr');
  row.innerHTML=`
    <td><input type="text" placeholder="TAG-00${tbody.rows.length+1}"></td>
    <td><input type="text" placeholder="Description"></td>
    <td><input type="text" placeholder="Serial Number"></td>
    <td><input type="text" placeholder="Model Number"></td>
    <td><input type="text" placeholder="Make / Brand"></td>
    <td><input type="text" placeholder="Invoice #"></td>
    <td><input type="number" value="1" min="1" style="text-align:center"></td>
    <td><input type="text" placeholder="Remarks"></td>`;
  tbody.appendChild(row);
}

function getAssets(){
  const rows=document.querySelectorAll('#asset-rows tr');
  return Array.from(rows).map(r=>{
    const cells=r.querySelectorAll('input');
    return{tag:cells[0].value,desc:cells[1].value,serial:cells[2].value,model:cells[3].value,make:cells[4].value,invoice:cells[5].value,qty:cells[6].value,remarks:cells[7].value};
  }).filter(a=>a.tag||a.desc);
}

function collectPayload(){
  return{
    issue_date:document.getElementById('issue_date').value,
    form_number:document.getElementById('form_number').value,
    category:document.getElementById('category').value,
    emp_name:document.getElementById('emp_name').value,
    designation:document.getElementById('designation').value,
    department:document.getElementById('department').value,
    emp_id:document.getElementById('emp_id').value,
    emp_email:document.getElementById('emp_email').value,
    location:document.getElementById('location').value,
    it_notes:document.getElementById('it_notes').value,
    assets:getAssets()
  };
}

function validate(p){
  if(!p.emp_name||!p.emp_email||!p.form_number||!p.issue_date||!p.category) return'Please fill all required fields (name, email, form number, date, category).';
  if(!p.assets.length) return'Add at least one asset row with a tag or description.';
  return null;
}

async function submitForm(){
  const p=collectPayload();
  const err=validate(p);
  const msgEl=document.getElementById('msg');
  msgEl.className='msg';
  if(err){msgEl.className='msg error';msgEl.textContent=err;return;}

  const btn=document.querySelector('.submit-btn');
  btn.disabled=true;btn.textContent='Sending…';

  // ──────────────────────────────────────────────────────────────
  // REPLACE THIS URL with your deployed Google Apps Script URL
  const APPS_SCRIPT_URL='https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
  // ──────────────────────────────────────────────────────────────

  try{
    const res=await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify(p)});
    const json=await res.json();
    if(json.success){
      msgEl.className='msg success';
      msgEl.textContent=`Form submitted! Email sent to ${p.emp_email}. Form ID: ${p.form_number}`;
    }else throw new Error(json.error||'Server error');
  }catch(e){
    msgEl.className='msg error';
    msgEl.textContent='Submit failed: '+e.message+'. Check your Apps Script URL.';
  }finally{btn.disabled=false;btn.textContent='Submit & Send to Employee';}
}

// Pre-fill today's date
document.getElementById('issue_date').value=new Date().toISOString().slice(0,10);
// Pre-fill sequential form number
document.getElementById('form_number').value='PSG-'+new Date().getFullYear()+'-'+String(Date.now()).slice(-4);
</script>
</body>
</html>
